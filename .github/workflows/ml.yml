name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: make install

      - name: 🔍 Lint del código
        run: make lint

      - name: 🧪 Entrenar modelo
        run: make train

      - name: ✅ Validar desempeño del modelo
        run: make test

      - name: 📤 Subir model.pkl como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: modelo-validado
          path: model.pkl

      - name: 📊 Subir mlruns como artefacto de trazabilidad
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-trazabilidad
          path: mlruns/
